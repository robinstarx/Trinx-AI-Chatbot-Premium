name: CI/CD Pipeline 

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    name: Continuous Integration
    runs-on: ubuntu-latest

    env:   # secrets & vars available for pytest
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      Tavily_API_KEY: ${{ secrets.Tavily_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras

      - name: Lint code with Ruff
        run: uv run ruff check .

      - name: Run tests with pytest
        run: uv run pytest -v

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Directory and Copy Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.YOUR_HOST }}
          username: ${{ secrets.YOUR_USERNAME }}
          key: ${{ secrets.YOUR_KEY }}
          port: 22
          # Define RELEASE_DIR here. scp-action will create the target directory.
          # Note: We must escape the $ for the command to run correctly.
          source: "." # This is your repo code
          target: "/var/www/alpha_releases/release_$(date +%s)"
      
      - name: Install Dependencies and Activate Release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.YOUR_HOST }}
          username: ${{ secrets.YOUR_USERNAME }}
          key: ${{ secrets.YOUR_KEY }}
          port: 22
          script: |
            set -e
            # Find the newest release directory
            RELEASE_DIR=$(ls -dt /var/www/alpha_releases/release_* | head -n 1)
            APP_SYMLINK="/var/www/alpha"
            
            echo "Activating release in: $RELEASE_DIR"
            
            # Activate virtual environment
            source /var/www/alpha/.venv/bin/activate
            
            # Install dependencies inside the new release folder
            cd $RELEASE_DIR
            uv sync --frozen
            
            # Update symlink for zero downtime
            ln -sfn $RELEASE_DIR $APP_SYMLINK
            
            # Restart app service
            sudo systemctl restart alpha.service
            
            echo "✅ Deployment complete"

